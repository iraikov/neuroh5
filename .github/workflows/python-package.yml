# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  HDF5_USE_FILE_LOCKING: FALSE

jobs:
  build-macos:
    runs-on: macOS-latest

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    env:
      # Enable OpenMPI oversubscription
      NEUROH5_MPIRUN_OVERSUBSCRIBE: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v1
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v2
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          export FC=gfortran
          export F77=gfortran
          brew install cmake hdf5-mpi
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install --upgrade numpy mpi4py h5py
          pip install flake8 pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Build
        run: |
          export PATH="/usr/local/opt/hdf5-parallel/bin:$PATH"
          export LDFLAGS="-L/usr/local/opt/hdf5-parallel/lib"
          export CPPFLAGS="-I/usr/local/opt/hdf5-parallel/include"
          export CC=mpicc
          export CXX=mpicxx
          python -m pip install -v .
      - name: Test import
        run: |
          python -m pip show -f neuroh5
          python ./tests/test_import.py
      - name: Test read and write
        run: |
          python ./tests/test_write_cell_attr.py
      - name: Run pytest unit test suite
        run: |
          pytest -v

 
  build-linux:

    runs-on: ubuntu-26.04
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - name: Checkout
      uses: actions/checkout@v2
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v2
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        sudo apt update -y && sudo apt upgrade
        sudo apt install build-essential cmake mpich libhdf5-mpich-dev
        python -m pip install --upgrade pip setuptools wheel
        python -m pip install --upgrade numpy h5py
        # Build mpi4py from source against the system mpich just
        # installed above.
        python -m pip install --no-binary mpi4py --upgrade mpi4py
        pip install flake8 pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    - name: Build
      run: |
        python -m pip install -v .
    - name: Test import
      run: |
        python -m pip show -f neuroh5
        python ./tests/test_import.py
    - name: Test read and write
      run: |
        python ./tests/test_write_cell_attr.py
    - name: Run pytest unit test suite
      run: |
        pytest -v
